# Build Shield backend from repo root (needs circuits/build + backend/Dockerfile).
#   gcloud builds submit . --config=cloudbuild.yaml
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/verifier
      - .
images:
  - gcr.io/$PROJECT_ID/verifier
